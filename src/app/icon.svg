<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Vinyl record background -->
  <circle cx="16" cy="16" r="15" fill="#1a1a1a" stroke="#333" stroke-width="0.5"/>
  <!-- Grooves -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#2a2a2a" stroke-width="0.4"/>
  <circle cx="16" cy="16" r="10" fill="none" stroke="#2a2a2a" stroke-width="0.4"/>
  <circle cx="16" cy="16" r="8" fill="none" stroke="#2a2a2a" stroke-width="0.3"/>
  <!-- Label center -->
  <circle cx="16" cy="16" r="5.5" fill="#d4d4d4"/>
  <!-- CTW text -->
  <text x="16" y="18.2" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="6" fill="#1a1a1a" letter-spacing="-0.3">CTW</text>
  <!-- Spindle hole -->
  <circle cx="16" cy="16" r="1" fill="#1a1a1a"/>
